<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account - Attendance Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="page-container">

    <h1 class="title">Attendance Tracker</h1>
    <p class="subtitle">Sign up to start tracking attendance</p>

    <div class="login-card">
        <h2>Create Account</h2>
        <p class="card-subtitle">Fill in the details below</p>
        {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
        {% endif %}


        <!-- IMPORTANT: method POST -->
        <form method="POST">

            <div class="form-group">
                <label>Full Name</label>
                <input 
                    type="text" 
                    name="name" 
                    placeholder="John Doe" 
                    required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input 
                    type="email" 
                    name="email" 
                    placeholder="you@example.com" 
                    required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input 
                    type="password" 
                    name="password" 
                    placeholder="••••••••" 
                    required>
            </div>

            <div class="form-group">
                <label>Account Type</label>
                <div class="radio-group">
                    <label>
                        <input 
                            type="radio" 
                            name="role" 
                            value="worker" 
                            checked>
                        Worker
                    </label>

                    <label>
                        <input 
                            type="radio" 
                            name="role" 
                            value="admin">
                        Admin
                    </label>
                </div>
            </div>

            <button type="submit" class="btn-login">
                Create Account
            </button>
        </form>

        <p class="signup-text">
            Already have an account? <a href="/">Sign in</a>
        </p>
    </div>

</div>

</body>
</html>
